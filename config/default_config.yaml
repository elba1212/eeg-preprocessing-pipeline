# Default configuration for eeg-preprocessing-pipeline.
# Values are placeholders and should be adapted to each dataset and protocol.

data:
  input_dir: data/raw
  output_dir: data/processed
  file_format: auto
  preload: false

sampling:
  original_frequency_hz: 1000.0
  target_frequency_hz: 250.0

filtering:
  analysis_high_pass_hz: 0.1
  ica_high_pass_hz: 1.0
  low_pass_hz: 40.0
  method: fir
  phase: zero
  fir_window: hamming
  fir_design: firwin
  filter_length: auto

line_noise:
  enabled: false
  frequency_hz: 50.0
  harmonics: 1
  method: fir

montage:
  name: GSN-HydroCel-256
  expected_eeg_channels: 256
  on_missing: warn

reference:
  method: average
  channels: []
  projection: false

ica:
  enabled: true
  n_components: 0.99
  method: picard
  random_state: 42
  max_iterations: auto
  reject_by_annotation: true
  classifier: iclabel
  artifact_labels:
    - eye blink
    - heart beat
    - muscle artifact
  label_probability_threshold: 0.8
  require_ica_filter: true
  require_annotations: true

bad_channels:
  enabled: true
  method: pyprep
  random_state: 42
  deviation: true
  correlation: true
  high_frequency_noise: true
  ransac: true

annotations:
  enabled: true
  zscore_threshold: 6.0
  window_seconds: 2.0
  min_bad_fraction: 0.25
  flat_peak_to_peak_threshold: 1.0e-12
  flat_variance_threshold: 1.0e-24
  clip_threshold: null
  clipped_fraction_threshold: 0.01
  description: BAD_noisy_window

epoching:
  enabled: true
  tmin: -0.2
  tmax: 0.8
  baseline:
    - null
    - 0.0
  preload: true
  reject_by_annotation: true
  event_id: {}

epoch_rejection:
  enabled: true
  method: manual
  reject: {}
  flat: {}
  autoreject_n_interpolate: null
  autoreject_consensus: null
  random_state: 42
  cv: 10
  n_jobs: 1

psd:
  enabled: true
  fmin_hz: 1.0
  fmax_hz: 45.0
  window_seconds: 4.0

reports:
  enabled: true
  output_dir: reports
  include_figures: true
  format: html
  use_mne_report: true
  redact_private_fields: true
  include_empty_sections: true

batch:
  enabled: true
  output_dir: outputs/batch
  resume: true
  n_jobs: 1
  parallel_backend: thread
  show_progress: true
  summary_csv_name: dataset_summary.csv
  log_file_name: batch.log
  anonymize_identifiers: true
